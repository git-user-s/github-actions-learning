name: 04 Actions
on: 
    workflow_dispatch:
jobs: 
    build:
        runs-on: ubuntu-latest
        defaults: 
            run: 
                working-directory: ./react-app
        steps: 
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Prinding Folders
              run: ls
            - name: setup node
              uses: actions/setup-node@v3
              with:
                node-version: '24.x'
            - name: Installing dependencies
              run: npm ci

